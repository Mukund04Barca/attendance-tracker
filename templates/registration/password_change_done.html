{% extends 'base.html' %}

{% block title %}Update Complete | Attendance Tracker{% endblock %}
{% block header_title %}Success{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto;">
    <div style="background: var(--surface); border: 1px solid var(--surface-border); border-radius: var(--border-radius-xl); padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); text-align: center;">
        <div style="font-size: 3.5rem; margin-bottom: 24px;">🔐</div>
        <h2 style="font-family: var(--display-font); font-weight: 800; font-size: 1.75rem; color: var(--text); margin-bottom: 16px;">Credentials Updated</h2>
        <p style="color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px;">
            Your authentication tokens have been successfully modified.
        </p>
        
        <a href="{% url 'checkin_checkout' %}" class="btn-commander btn-commander-primary" style="display: block; text-decoration: none; padding: 16px;">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
