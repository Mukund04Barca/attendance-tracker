{% extends 'base.html' %}

{% block title %}Password Reset Complete | Attendance Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-lg p-5 border-success">
            <h2 class="mb-3 text-success">Password Updated</h2>
            <p class="mb-4">Your password has been successfully reset. You may now log in with your new password.</p>
            <div class="mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2" style="font-weight: 600;">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
